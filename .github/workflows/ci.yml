name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (dev + extras under test)
        run: |
          python -m pip install --upgrade pip
          # postgres: psycopg is imported eagerly by the PG connector module.
          # csv: polars backs the CSV connector. owl: rdflib for OWL round-trip tests.
          # mysql/mssql/snowflake drivers are intentionally NOT installed so their
          # "missing driver" paths are tested.
          python -m pip install -e ".[dev,postgres,csv,owl]"

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q
